from IPython.display import HTML

HTML('''
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pengingat Jadwal Sekolah</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
        }
        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .day-group {
            margin-bottom: 15px;
        }
        label {
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
            color: #34495e;
        }
        textarea {
            width: 100%;
            height: 60px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            resize: vertical;
            box-sizing: border-box;
            font-family: inherit;
        }
        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 12px 20px;
            width: 100%;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            margin-bottom: 10px;
            transition: 0.3s;
        }
        button:hover {
            background-color: #2980b9;
        }
        .btn-permission {
            background-color: #e67e22;
        }
        .btn-permission:hover {
            background-color: #d35400;
        }
        .info {
            font-size: 0.9em;
            color: #7f8c8d;
            text-align: center;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <h1>Pengingat Jadwal</h1>

    <div class="card">
        <p class="info">Notifikasi jadwal besok + kata motivasi akan muncul otomatis hari ini antara jam 20:00 - 00:00.</p>
        <button class="btn-permission" onclick="requestNotificationPermission()">Izinkan Notifikasi Perangkat</button>
    </div>

    <div class="card" id="scheduleForm">
        <div class="day-group"><label>Senin</label><textarea id="Senin" placeholder="Contoh: Matematika, Fisika, B. Inggris..."></textarea></div>
        <div class="day-group"><label>Selasa</label><textarea id="Selasa"></textarea></div>
        <div class="day-group"><label>Rabu</label><textarea id="Rabu"></textarea></div>
        <div class="day-group"><label>Kamis</label><textarea id="Kamis"></textarea></div>
        <div class="day-group"><label>Jumat</label><textarea id="Jumat"></textarea></div>
        <div class="day-group"><label>Sabtu</label><textarea id="Sabtu"></textarea></div>
        <div class="day-group"><label>Minggu</label><textarea id="Minggu"></textarea></div>

        <button onclick="saveSchedule()">Simpan Jadwal</button>
    </div>

    <script>
        const daysArray = ["Minggu", "Senin", "Selasa", "Rabu", "Kamis", "Jumat", "Sabtu"];

        // Daftar kata-kata penyemangat
        const motivasi = [
            "Semangat buat besok ya! Jangan lupa disiapkan bukunya.",
            "Besok hari baru, kesempatan baru! Cek jadwalmu dulu yuk.",
            "Tidur yang nyenyak biar besok fokus belajarnya!",
            "Jangan sampai ada yang tertinggal ya, semangat belajarnya!",
            "Success starts with preparation. Yuk, cek jadwal besok!",
            "Istirahat yang cukup ya, biar besok masuk sekolah dengan segar!",
            "Satu langkah lebih dekat dengan cita-citamu. Semangat!"
        ];

        function requestNotificationPermission() {
            if (!("Notification" in window)) {
                alert("Browser kamu tidak mendukung fitur notifikasi.");
            } else {
                Notification.requestPermission().then(permission => {
                    if (permission === "granted") {
                        alert("Sip! Notifikasi sudah aktif.");
                    } else {
                        alert("Notifikasi belum diizinkan.");
                    }
                });
            }
        }

        function saveSchedule() {
            const schedules = {};
            daysArray.forEach(day => {
                schedules[day] = document.getElementById(day).value;
            });
            localStorage.setItem('schoolSchedules', JSON.stringify(schedules));
            alert("Jadwal Berhasil Disimpan!");
        }

        function loadSchedule() {
            const schedules = JSON.parse(localStorage.getItem('schoolSchedules')) || {};
            daysArray.forEach(day => {
                if (schedules[day]) document.getElementById(day).value = schedules[day];
            });
        }

        function checkAndShowNotification() {
            const now = new Date();
            const currentHour = now.getHours();
            const currentDayIndex = now.getDay();

            // Cek apakah waktu saat ini antara jam 20.00 - 23.59
            if (currentHour >= 20 && currentHour <= 23) {
                const tomorrowIndex = (currentDayIndex + 1) % 7;
                const tomorrowName = daysArray[tomorrowIndex];

                const schedules = JSON.parse(localStorage.getItem('schoolSchedules')) || {};
                const tomorrowSchedule = schedules[tomorrowName];

                const lastNotifiedDate = localStorage.getItem('lastNotifiedDate');
                const todayString = now.toDateString();

                // Jika besok ada jadwal dan hari ini belum dikasih notif
                if (tomorrowSchedule && tomorrowSchedule.trim() !== "" && lastNotifiedDate !== todayString) {

                    // Pilih kata motivasi acak
                    const kataAcak = motivasi[Math.floor(Math.random() * motivasi.length)];

                    const title = `Persiapan Besok (${tomorrowName})`;
                    const bodyText = `${kataAcak}\n\nJadwal: ${tomorrowSchedule}`;

                    if (Notification.permission === "granted") {
                        new Notification(title, { body: bodyText });
                    } else {
                        // Fallback kalau notifikasi browser mati
                        alert(`${title}\n\n${bodyText}`);
                    }

                    // Tandai supaya tidak spam notif berkali-kali di malam yang sama
                    localStorage.setItem('lastNotifiedDate', todayString);
                }
            }
        }

        // Jalankan saat web pertama kali dimuat
        loadSchedule();

        // Cek jadwal setiap 1 menit
        setInterval(checkAndShowNotification, 60000);

    </script>
</body>
</html>
'''
)
